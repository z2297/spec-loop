name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Self-contained manifest validation
        run: python3 scripts/validate_marketplace.py .

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Official plugin validation
        run: |
          claude --version
          claude plugin --help || true
          claude plugin validate .
          for d in plugins/*/; do
            echo "Validating $d"
            claude plugin validate "$d"
          done

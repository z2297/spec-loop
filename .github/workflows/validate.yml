name: validate

on:
  pull_request:
  push:
    branches: [main, beta, alpha]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Self-contained manifest validation
        run: python3 scripts/validate_marketplace.py .

      - name: Python unittest suite
        run: python3 -m unittest discover -s scripts -p 'test_*.py'

      - name: Coverage floor gate (stdlib trace, no-regression)
        run: python3 scripts/measure_coverage.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Client JS test suite (Node built-ins)
        # Fail closed on an emptied/truncated suite: `node --test` exits 0 when a
        # file registers zero tests, so also assert a minimum count (mirrors the
        # Python lane's MIN_TESTS guard in measure_coverage.py). A JS coverage
        # NUMBER gate is deferred to s7 — Node 20 has no per-metric threshold flags.
        run: |
          set -o pipefail
          out=$(node --test --experimental-test-coverage scripts/dashboard_assets/index.test.mjs 2>&1)
          echo "$out"
          ran=$(printf '%s\n' "$out" | sed -n 's/^# tests \([0-9][0-9]*\).*/\1/p')
          if [ "${ran:-0}" -lt 12 ]; then
            echo "FAIL: only ${ran:-0} client JS tests ran (expected >= 12)"; exit 1
          fi

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Official plugin validation
        run: |
          claude --version
          claude plugin --help || true
          claude plugin validate .
          for d in plugins/*/; do
            echo "Validating $d"
            claude plugin validate "$d"
          done
